<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sempiternal Lyrics Player</title>
    <style>

        :root {
            --accent: #d03c5a;
            --lyric-size: 3.5rem;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Controls ── */
        #controls-wrap {
            flex-shrink: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease;
            max-height: 200px;
            overflow: visible;
        }

        body.fullscreen #controls-wrap {
            max-height: 0 !important;
            opacity: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .controls {
            background-color: #000000;
            padding: 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            border-bottom: 1px solid #282828;
            z-index: 10;
            flex-wrap: nowrap;
        }

        .controls input[type="text"] {
            padding: 0 10px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #242424;
            color: white;
            width: 180px;
            height: 38px;
            font-family: inherit;
            font-size: 14px;
            box-sizing: border-box;
            line-height: 38px;
            transition: width 0.4s ease, border-color 0.3s, opacity 0.3s;
        }

        .controls button {
            background-color: var(--accent);
            color: white;
            border: none;
            height: 38px;
            padding: 0 20px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, filter 0.2s;
            white-space: nowrap;
        }

        .controls button:hover:not(:disabled) { filter: brightness(1.2); transform: scale(1.05); }

        .controls button:disabled {
            background-color: #555;
            color: #888;
            cursor: not-allowed;
            transform: none;
        }

        #video-info { display: flex; align-items: center; gap: 12px; }

        #video-title {
            font-size: 1rem;
            font-weight: bold;
            color: #fff;
            max-width: 150px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #video-duration { color: var(--accent); font-size: 0.9em; font-weight: bold; white-space: nowrap; }

        .search-group { position: relative; display: flex; gap: 10px; }

        #yt-results, #search-results {
            position: absolute;
            top: 100%;
            left: 0;
            margin-top: 5px;
            background: #282828;
            width: 350px;
            max-height: 300px;
            overflow-y: auto;
            border-radius: 6px;
            z-index: 100;
            box-shadow: 0 8px 16px rgba(0,0,0,0.7);
            display: none;
            white-space: normal;
        }

        #yt-results.active, #search-results.active { display: block; }

        .yt-result-thumb {
            width: 80px;
            height: 45px;
            object-fit: cover;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .yt-result-info { display: flex; flex-direction: column; gap: 3px; overflow: hidden; }
        .yt-result-title { font-weight: bold; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .yt-result-meta { font-size: 0.8rem; color: #b3b3b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .result-item.yt-item { flex-direction: row; align-items: center; gap: 10px; }

        .result-item {
            padding: 12px;
            border-bottom: 1px solid #3e3e3e;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .result-item:hover { background: #3e3e3e; }
        .result-header { display: flex; justify-content: space-between; align-items: center; }
        .result-title { font-weight: bold; color: #fff; }
        .result-duration { font-size: 0.85rem; color: var(--accent); font-weight: bold; }
        .result-artist { font-size: 0.85rem; color: #b3b3b3; }

        #youtube-container { width: 200px; height: 56px; margin-left: auto; flex-shrink: 0; }

        /* ── Phase-based focus ── */
        .search-group, #video-info, #play-btn {
            transition: opacity 0.35s ease;
        }

        /* phase-video: video search active */
        body.phase-video #yt-url              { width: 320px; border-color: var(--accent); }
        body.phase-video #lyrics-search-group { opacity: 0.35; }
        body.phase-video #lyrics-search       { width: 140px; }
        body.phase-video #play-btn            { opacity: 0.35; }

        /* phase-lyrics: lyrics search active */
        body.phase-lyrics #yt-url             { width: 160px; }
        body.phase-lyrics #lyrics-search      { width: 320px; border-color: var(--accent); }
        body.phase-lyrics #play-btn           { opacity: 0.35; }

        /* phase-play: playback active */
        body.phase-play #yt-url               { width: 140px; }
        body.phase-play #lyrics-search        { width: 160px; }
        body.phase-play #yt-search-group      { opacity: 0.5; }
        body.phase-play #lyrics-search-group  { opacity: 0.5; }

        /* ── Progress bar ── */
        #progress-wrap {
            height: 20px;
            background: #1a1a1a;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0 0;
            flex-shrink: 0;
            position: relative;
            transition: height 0.15s;
        }

        #progress-wrap:hover { height: 28px; }

        #progress-bg {
            position: absolute;
            inset: 0;
            background: #2a2a2a;
        }

        #progress-bar {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 0%;
            background: var(--accent);
            transition: width 0.1s linear;
        }

        #progress-time {
            position: absolute;
            right: 10px;
            font-size: 0.72rem;
            color: #aaa;
            pointer-events: none;
            z-index: 1;
        }

        body.fullscreen #progress-wrap { display: none; }

        /* ── Lyrics ── */
        .lyrics-wrapper {
            flex: 1;
            overflow-y: auto;
            position: relative;
            padding: 0 10%;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .lyrics-wrapper::-webkit-scrollbar { display: none; }

        #lyrics-container {
            padding: 40vh 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .lyric-line {
            font-size: var(--lyric-size);
            font-weight: 700;
            letter-spacing: 1px;
            color: #6a6a6a;
            transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.3s ease;
            cursor: pointer;
            transform-origin: left center;
        }

        .lyric-line:hover { color: #b3b3b3; }

        .lyric-line.active {
            color: #ffffff;
            transform: scale(1.05);
            text-shadow: 0 0 20px color-mix(in srgb, var(--accent) 70%, transparent);
        }

        /* ── Floating controls ── */
        #floating-controls {
            position: absolute;
            bottom: 24px;
            right: 24px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 20;
        }

        .float-group {
            display: flex;
            gap: 6px;
            align-items: center;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            padding: 6px 10px;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .float-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            line-height: 1;
        }

        .float-btn:hover { background: rgba(255,255,255,0.22); }

        #font-size-label { font-size: 0.75rem; color: #aaa; min-width: 38px; text-align: center; }

        .color-swatch {
            width: 22px;
            height: 22px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }

        .color-swatch:hover { transform: scale(1.2); }
        .color-swatch.selected { border-color: #fff; transform: scale(1.15); }

        /* ── Fullscreen hint ── */
        #fs-hint {
            position: absolute;
            top: 12px;
            right: 14px;
            font-size: 0.72rem;
            color: rgba(255,255,255,0.25);
            pointer-events: none;
            z-index: 5;
            transition: opacity 0.3s;
        }

        body:not(.fullscreen) #fs-hint { opacity: 0; }

        /* ── Keyboard shortcuts toast ── */
        #shortcuts-toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            border: 1px solid rgba(255,255,255,0.12);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 16px 24px;
            font-size: 0.82rem;
            color: #ccc;
            z-index: 200;
            display: none;
            line-height: 1.8;
            min-width: 260px;
        }

        #shortcuts-toast.visible { display: block; }
        #shortcuts-toast kbd {
            background: #333;
            border-radius: 4px;
            padding: 1px 6px;
            font-family: monospace;
            color: #fff;
            font-size: 0.85em;
        }

    </style>
</head>
<body>

    <div id="controls-wrap">
        <div class="controls">
            <div class="search-group" id="yt-search-group">
                <input type="text" id="yt-url" placeholder="Search or paste YouTube URL…" style="width:220px">
                <div id="yt-results"></div>
            </div>

            <div id="video-info">
                <div id="video-title" title="No video loaded">No video</div>
                <span id="video-duration"></span>
            </div>

            <div class="search-group" id="lyrics-search-group">
                <input type="text" id="lyrics-search" placeholder="Search lrclib.net...">
                <button id="search-btn">Search</button>
                <div id="search-results"></div>
            </div>

            <button id="play-btn" disabled>Play</button>

            <div id="youtube-container">
                <div id="player"></div>
            </div>
        </div>
    </div>

    <div id="progress-wrap">
        <div id="progress-bg"></div>
        <div id="progress-bar"></div>
        <span id="progress-time">0:00 / 0:00</span>
    </div>

    <div class="lyrics-wrapper" id="lyrics-wrapper">
        <div id="lyrics-container">
            <div class="lyric-line" style="text-align: center; color: #b3b3b3; font-size: 2rem;">
                Load a YouTube video to begin.
            </div>
        </div>

        <span id="fs-hint">Press F to exit fullscreen</span>

        <div id="floating-controls">
            <div class="float-group" id="color-group"></div>
            <div class="float-group">
                <button class="float-btn" id="font-dec-btn" title="Decrease font size (-)">−</button>
                <span id="font-size-label">3.5rem</span>
                <button class="float-btn" id="font-inc-btn" title="Increase font size (+)">+</button>
            </div>
            <div class="float-group">
                <button class="float-btn" id="fullscreen-btn" title="Toggle fullscreen (F)">⛶</button>
                <button class="float-btn" id="shortcuts-btn" title="Keyboard shortcuts (?)">?</button>
            </div>
        </div>
    </div>

    <div id="shortcuts-toast">
        <strong style="color:#fff; display:block; margin-bottom:6px;">Keyboard Shortcuts</strong>
        <kbd>Space</kbd> Play / Pause<br>
        <kbd>←</kbd> <kbd>→</kbd> Seek ±5s<br>
        <kbd>+</kbd> <kbd>−</kbd> Font size<br>
        <kbd>F</kbd> Fullscreen<br>
        <kbd>?</kbd> This help
    </div>

    <script src="config.js"></script>
    <script>
        // ── State ──────────────────────────────────────────────────────────────
        let player;
        let parsedLyrics = [];
        let syncInterval;
        let progressInterval;
        let currentActiveIndex = -1;

        // ── Palette ────────────────────────────────────────────────────────────
        const PALETTE = [
            { color: '#d03c5a', label: 'Red' },
            { color: '#4a9eff', label: 'Blue' },
            { color: '#1db954', label: 'Green' },
            { color: '#ff8c00', label: 'Amber' },
            { color: '#9b59b6', label: 'Purple' },
        ];

        // ── Persist & restore settings ─────────────────────────────────────────
        const FONT_SIZES = [1.5, 2, 2.5, 3, 3.5, 4, 5, 6];
        let fontSizeIndex = parseInt(localStorage.getItem('fontSizeIndex') ?? '4');
        let savedColor = localStorage.getItem('accentColor') || PALETTE[0].color;

        function applyFontSize() {
            const size = FONT_SIZES[fontSizeIndex];
            document.documentElement.style.setProperty('--lyric-size', size + 'rem');
            document.getElementById('font-size-label').textContent = size + 'rem';
            localStorage.setItem('fontSizeIndex', fontSizeIndex);
        }

        function applyColor(color) {
            document.documentElement.style.setProperty('--accent', color);
            localStorage.setItem('accentColor', color);
            document.querySelectorAll('.color-swatch').forEach(s => {
                s.classList.toggle('selected', s.dataset.color === color);
            });
        }

        applyFontSize();

        // ── Build color swatches ───────────────────────────────────────────────
        const colorGroup = document.getElementById('color-group');
        PALETTE.forEach(({ color, label }) => {
            const swatch = document.createElement('div');
            swatch.className = 'color-swatch';
            swatch.style.background = color;
            swatch.dataset.color = color;
            swatch.title = label;
            swatch.addEventListener('click', () => applyColor(color));
            colorGroup.appendChild(swatch);
        });
        applyColor(savedColor);

        // ── Font size buttons ──────────────────────────────────────────────────
        document.getElementById('font-inc-btn').addEventListener('click', () => {
            if (fontSizeIndex < FONT_SIZES.length - 1) { fontSizeIndex++; applyFontSize(); }
        });
        document.getElementById('font-dec-btn').addEventListener('click', () => {
            if (fontSizeIndex > 0) { fontSizeIndex--; applyFontSize(); }
        });

        // ── Phase ──────────────────────────────────────────────────────────────
        function setPhase(phase) {
            document.body.classList.remove('phase-video', 'phase-lyrics', 'phase-play');
            document.body.classList.add('phase-' + phase);
        }
        setPhase('video');

        // ── Fullscreen ─────────────────────────────────────────────────────────
        function toggleFullscreen() {
            document.body.classList.toggle('fullscreen');
        }
        document.getElementById('fullscreen-btn').addEventListener('click', toggleFullscreen);

        // ── Shortcuts toast ────────────────────────────────────────────────────
        const toast = document.getElementById('shortcuts-toast');
        let toastTimer;
        function showShortcuts() {
            clearTimeout(toastTimer);
            toast.classList.add('visible');
            toastTimer = setTimeout(() => toast.classList.remove('visible'), 4000);
        }
        document.getElementById('shortcuts-btn').addEventListener('click', showShortcuts);

        // ── Keyboard shortcuts ─────────────────────────────────────────────────
        document.addEventListener('keydown', (e) => {
            const tag = document.activeElement.tagName;
            if (tag === 'INPUT' || tag === 'TEXTAREA') return;

            switch (e.key) {
                case ' ':
                    e.preventDefault();
                    if (!player) return;
                    if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
                    else player.playVideo();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    if (player && player.seekTo) player.seekTo(player.getCurrentTime() + 5, true);
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    if (player && player.seekTo) player.seekTo(Math.max(0, player.getCurrentTime() - 5), true);
                    break;
                case '+': case '=':
                    if (fontSizeIndex < FONT_SIZES.length - 1) { fontSizeIndex++; applyFontSize(); }
                    break;
                case '-': case '_':
                    if (fontSizeIndex > 0) { fontSizeIndex--; applyFontSize(); }
                    break;
                case 'f': case 'F':
                    toggleFullscreen();
                    break;
                case '?':
                    showShortcuts();
                    break;
            }
        });

        // ── Progress bar ───────────────────────────────────────────────────────
        const progressBar = document.getElementById('progress-bar');
        const progressTime = document.getElementById('progress-time');
        const progressWrap = document.getElementById('progress-wrap');

        function updateProgress() {
            if (!player || !player.getCurrentTime) return;
            const cur = player.getCurrentTime();
            const dur = player.getDuration();
            if (!dur) return;
            const pct = (cur / dur) * 100;
            progressBar.style.width = pct + '%';
            progressTime.textContent = `${formatDuration(cur)} / ${formatDuration(dur)}`;
        }

        progressWrap.addEventListener('click', (e) => {
            if (!player || !player.getDuration) return;
            const rect = progressWrap.getBoundingClientRect();
            const ratio = (e.clientX - rect.left) / rect.width;
            player.seekTo(ratio * player.getDuration(), true);
        });

        // ── YouTube API ────────────────────────────────────────────────────────
        // YT_API_KEY is loaded from config.js (not tracked in git)

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.getElementsByTagName('script')[0].parentNode.insertBefore(tag, document.getElementsByTagName('script')[0]);

        function onYouTubeIframeAPIReady() {}

        // Video search
        const ytInput = document.getElementById('yt-url');
        const ytResultsBox = document.getElementById('yt-results');
        let ytSearchTimer;

        ytInput.addEventListener('input', () => {
            const val = ytInput.value.trim();
            clearTimeout(ytSearchTimer);
            if (!val) { ytResultsBox.classList.remove('active'); return; }
            if (extractVideoID(val)) {
                ytResultsBox.classList.remove('active');
                loadVideoById(extractVideoID(val));
                return;
            }
            ytSearchTimer = setTimeout(() => searchYouTube(val), 500);
        });

        ytInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                clearTimeout(ytSearchTimer);
                const val = ytInput.value.trim();
                if (extractVideoID(val)) loadVideoById(extractVideoID(val));
                else searchYouTube(val);
            }
        });

        async function searchYouTube(query) {
            ytResultsBox.innerHTML = '<div class="result-item" style="color:#b3b3b3;">Searching…</div>';
            ytResultsBox.classList.add('active');
            try {
                const searchRes = await fetch(
                    `https://www.googleapis.com/youtube/v3/search?part=snippet&type=video&maxResults=8&q=${encodeURIComponent(query)}&key=${YT_API_KEY}`
                );
                const searchData = await searchRes.json();
                if (!searchData.items?.length) {
                    ytResultsBox.innerHTML = '<div class="result-item" style="color:#b3b3b3;">No results.</div>';
                    return;
                }

                const ids = searchData.items.map(i => i.id.videoId).join(',');
                const detailRes = await fetch(
                    `https://www.googleapis.com/youtube/v3/videos?part=contentDetails&id=${ids}&key=${YT_API_KEY}`
                );
                const detailData = await detailRes.json();
                const durations = {};
                detailData.items?.forEach(v => { durations[v.id] = parseISO8601(v.contentDetails.duration); });

                ytResultsBox.innerHTML = '';
                searchData.items.forEach(item => {
                    const { videoId } = item.id;
                    const { title, channelTitle, thumbnails } = item.snippet;
                    const thumb = thumbnails?.default?.url || '';
                    const dur = durations[videoId] ? formatDuration(durations[videoId]) : '';

                    const div = document.createElement('div');
                    div.className = 'result-item yt-item';
                    div.innerHTML = `
                        <img class="yt-result-thumb" src="${thumb}" alt="">
                        <div class="yt-result-info">
                            <div class="yt-result-title">${title}</div>
                            <div class="yt-result-meta">${channelTitle}${dur ? ' • ' + dur : ''}</div>
                        </div>
                    `;
                    div.addEventListener('click', () => {
                        ytResultsBox.classList.remove('active');
                        ytInput.value = title;
                        loadVideoById(videoId);
                    });
                    ytResultsBox.appendChild(div);
                });
            } catch (err) {
                console.error(err);
                ytResultsBox.innerHTML = '<div class="result-item" style="color:red;">Search failed.</div>';
            }
        }

        function parseISO8601(str) {
            const m = str.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return 0;
            return (parseInt(m[1] || 0) * 3600) + (parseInt(m[2] || 0) * 60) + parseInt(m[3] || 0);
        }

        document.addEventListener('click', (e) => {
            if (!document.getElementById('yt-search-group').contains(e.target))
                ytResultsBox.classList.remove('active');
        });

        function loadVideoById(videoId) {
            document.getElementById('video-title').innerText = "Loading...";
            document.getElementById('video-duration').innerText = "";
            document.getElementById('play-btn').disabled = true;
            lastTitle = '';
            setPhase('video');
            if (!player) {
                player = new YT.Player('player', {
                    height: '56', width: '200', videoId,
                    events: { onReady: onPlayerReady, onStateChange: onPlayerStateChange }
                });
            } else {
                player.cueVideoById(videoId);
            }
        }

        document.getElementById('play-btn').addEventListener('click', () => {
            if (!player) return;
            if (player.getPlayerState() === YT.PlayerState.PLAYING) player.pauseVideo();
            else player.playVideo();
        });

        function onPlayerReady() { updateVideoInfo(); }

        function onPlayerStateChange(event) {
            const playBtn = document.getElementById('play-btn');
            if (event.data === YT.PlayerState.PLAYING) {
                syncInterval = setInterval(syncLyrics, 100);
                progressInterval = setInterval(updateProgress, 250);
                playBtn.innerText = "Pause";
            } else {
                clearInterval(syncInterval);
                clearInterval(progressInterval);
                playBtn.innerText = "Play";
                updateProgress();
            }
            updateVideoInfo();
        }

        let lastTitle = '';
        function updateVideoInfo() {
            if (!player || !player.getVideoData) return;
            const data = player.getVideoData();
            if (!data || !data.title) return;

            const titleEl = document.getElementById('video-title');
            const durationEl = document.getElementById('video-duration');

            if (data.title !== lastTitle) {
                lastTitle = data.title;
                titleEl.innerText = data.title;
                titleEl.title = data.title;
                document.getElementById('play-btn').disabled = false;

                const searchInput = document.getElementById('lyrics-search');
                const cleaned = cleanTitleForSearch(data.title);
                searchInput.value = cleaned;
                setPhase('lyrics');
                triggerSearch(cleaned);
            }

            if (player.getDuration && player.getDuration() > 0) {
                durationEl.innerText = ` • ${formatDuration(player.getDuration())}`;
            }
        }

        // ── Search ─────────────────────────────────────────────────────────────
        let autoSearchTimer;
        function triggerSearch(query) {
            clearTimeout(autoSearchTimer);
            autoSearchTimer = setTimeout(() => doSearch(query), 600);
        }

        document.getElementById('search-btn').addEventListener('click', () => {
            doSearch(document.getElementById('lyrics-search').value.trim());
        });

        document.getElementById('lyrics-search').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doSearch(document.getElementById('lyrics-search').value.trim());
        });

        async function doSearch(query) {
            if (!query) return;
            const resultsBox = document.getElementById('search-results');
            resultsBox.innerHTML = '<div class="result-item" style="color:#b3b3b3;">Searching...</div>';
            resultsBox.classList.add('active');

            try {
                const response = await fetch(`https://lrclib.net/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                resultsBox.innerHTML = '';
                const validTracks = data.filter(t => t.syncedLyrics);

                if (validTracks.length === 0) {
                    resultsBox.innerHTML = '<div class="result-item" style="color:#b3b3b3;">No synced lyrics found.</div>';
                    return;
                }

                validTracks.forEach(track => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-header">
                            <span class="result-title">${track.trackName}</span>
                            <span class="result-duration">${formatDuration(track.duration)}</span>
                        </div>
                        <div class="result-artist">${track.artistName} • ${track.albumName}</div>
                    `;
                    div.addEventListener('click', () => {
                        parsedLyrics = parseLRC(track.syncedLyrics);
                        renderLyrics(parsedLyrics);
                        resultsBox.classList.remove('active');
                        document.getElementById('lyrics-search').value = `${track.artistName} - ${track.trackName}`;
                        setPhase('play');
                    });
                    resultsBox.appendChild(div);
                });
            } catch {
                resultsBox.innerHTML = '<div class="result-item" style="color:red;">Error fetching lyrics.</div>';
            }
        }

        document.addEventListener('click', (e) => {
            if (!document.querySelector('.search-group').contains(e.target))
                document.getElementById('search-results').classList.remove('active');
        });

        // ── Helpers ────────────────────────────────────────────────────────────
        function extractVideoID(url) {
            const m = url.match(/^.*(youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|&v=)([^#&?]*).*/);
            return (m && m[2].length === 11) ? m[2] : null;
        }

        const NOISE_WORDS = [
            'official', 'music', 'video', 'lyric', 'lyrics', 'audio', 'karaoke',
            'instrumental', 'acoustic', 'live', 'cover', 'remix', 'remaster',
            'remastered', 'visualizer', 'explicit', 'clean', 'extended', 'version',
            'hd', '4k', 'hq', 'full', 'album', 'stream', 'ft', 'feat',
        ];

        function cleanTitleForSearch(title) {
            return title
                .replace(/\[.*?\]|\(.*?\)|\{.*?\}/g, '')
                .replace(new RegExp(`\\b(${NOISE_WORDS.join('|')})\\b`, 'gi'), '')
                .replace(/[-–|]+/g, ' ')
                .replace(/\s{2,}/g, ' ')
                .trim();
        }

        function formatDuration(s) {
            if (!s) return '--:--';
            const m = Math.floor(s / 60);
            return `${m}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
        }

        function parseLRC(lrcText) {
            const timeRe = /\[(\d{2}):(\d{2})\.(\d{2,3})\]/;
            return lrcText.split('\n').reduce((acc, line) => {
                const m = line.match(timeRe);
                if (!m) return acc;
                const ms = parseInt(m[3]) * (m[3].length === 2 ? 10 : 1);
                const time = parseInt(m[1]) * 60 + parseInt(m[2]) + ms / 1000;
                const text = line.replace(timeRe, '').trim();
                if (text) acc.push({ time, text });
                return acc;
            }, []);
        }

        function renderLyrics(lyrics) {
            const container = document.getElementById('lyrics-container');
            container.innerHTML = '';
            currentActiveIndex = -1;

            if (!lyrics.length) {
                container.innerHTML = '<div class="lyric-line" style="text-align:center;color:#b3b3b3;">No valid timestamps found.</div>';
                return;
            }

            lyrics.forEach((lyric, i) => {
                const div = document.createElement('div');
                div.className = 'lyric-line';
                div.id = `lyric-${i}`;
                div.innerText = lyric.text;
                div.addEventListener('click', () => { if (player?.seekTo) player.seekTo(lyric.time, true); });
                container.appendChild(div);
            });
        }

        function syncLyrics() {
            if (!player?.getCurrentTime || !parsedLyrics.length) return;
            const t = player.getCurrentTime();
            let idx = -1;
            for (let i = 0; i < parsedLyrics.length; i++) {
                if (t >= parsedLyrics[i].time) idx = i; else break;
            }
            if (idx === currentActiveIndex || idx === -1) return;
            if (currentActiveIndex !== -1)
                document.getElementById(`lyric-${currentActiveIndex}`)?.classList.remove('active');
            const el = document.getElementById(`lyric-${idx}`);
            if (el) { el.classList.add('active'); el.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
            currentActiveIndex = idx;
        }
    </script>
</body>
</html>
